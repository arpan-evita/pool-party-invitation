<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The 40 Club — Full Guest Registry</title>
  <meta name="robots" content="noindex, nofollow">
  <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --gold: #c9a84c;
      --gold-light: #dfc27d;
      --black: #0a0a0a;
      --dark-gray: #1a1a1a;
      --cream: #f3f0e8;
      --cream-dk: #d1cdc2;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--black);
      color: var(--cream);
      font-family: 'Inter', sans-serif;
      overflow-x: hidden;
      line-height: 1.6;
    }

    header {
      padding: 40px 20px;
      text-align: center;
      border-bottom: 1px solid rgba(201, 168, 76, 0.1);
    }

    h1 {
      font-family: 'Bodoni Moda', serif;
      font-size: 2rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .subtitle {
      font-size: 0.8rem;
      letter-spacing: 0.2em;
      color: var(--gold);
      text-transform: uppercase;
    }

    .container {
      width: 98%;
      max-width: 1600px;
      margin: 30px auto;
      padding: 0 10px;
    }

    .controls {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 25px;
      gap: 15px;
    }

    .search-box {
      flex: 1;
      position: relative;
    }

    .search-box input {
      width: 100%;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(201, 168, 76, 0.2);
      padding: 12px 20px;
      color: var(--cream);
      border-radius: 4px;
      font-family: inherit;
      outline: none;
    }

    .btn-refresh {
      background: var(--gold);
      color: var(--black);
      border: none;
      padding: 12px 24px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      cursor: pointer;
      border-radius: 4px;
    }

    /* Horizontal Scroll Container */
    .table-wrapper {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(201, 168, 76, 0.1);
      border-radius: 8px;
      overflow-x: auto;
      margin-bottom: 40px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
      min-width: 1400px; /* Force scroll for wide data */
    }

    th {
      background: rgba(201, 168, 76, 0.05);
      padding: 15px 12px;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--gold);
      border-bottom: 1px solid rgba(201, 168, 76, 0.2);
      white-space: nowrap;
    }

    td {
      padding: 15px 12px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      font-size: 0.8rem;
      white-space: nowrap;
    }

    /* Wrap column for 'Why' text */
    td.col-why {
      white-space: normal;
      min-width: 200px;
      max-width: 300px;
      font-size: 0.75rem;
      color: var(--cream-dk);
    }

    tr:hover td {
      background: rgba(255, 255, 255, 0.02);
    }

    .status {
      display: inline-block;
      padding: 3px 8px;
      border-radius: 3px;
      font-size: 0.65rem;
      font-weight: 600;
      text-transform: uppercase;
    }

    .status-paid { background: rgba(76, 201, 126, 0.15); color: #4cc97e; }
    .status-pending { background: rgba(201, 168, 76, 0.15); color: var(--gold); }

    .loader {
      display: none;
      justify-content: center;
      padding: 40px;
      color: var(--gold);
      font-style: italic;
      font-size: 0.8rem;
    }

    .no-data {
      padding: 40px;
      text-align: center;
      color: var(--cream-dk);
      font-style: italic;
    }

    /* Custom Scrollbar */
    .table-wrapper::-webkit-scrollbar { height: 6px; }
    .table-wrapper::-webkit-scrollbar-track { background: var(--black); }
    .table-wrapper::-webkit-scrollbar-thumb { background: var(--gold-dk); border-radius: 3px; }

  </style>
</head>
<body>

<header>
  <h1>Full Guest Registry</h1>
  <p class="subtitle">The 40 Club — Complete Lead Details</p>
</header>

<div class="container">
  <div class="controls">
    <div class="search-box">
      <input type="text" id="search" placeholder="Search any detail..." oninput="filterData()">
    </div>
    <button class="btn-refresh" onclick="fetchData()">Refresh List</button>
  </div>

  <div class="table-wrapper">
    <div id="loader" class="loader">SYNCING REAL-TIME DATA...</div>
    <table id="leads-table">
      <thead>
        <tr>
          <th>Date & Time</th>
          <th>Guest Name</th>
          <th>Phone</th>
          <th>Email</th>
          <th>Instagram</th>
          <th>Tier</th>
          <th>Occupation</th>
          <th>Age</th>
          <th>Source</th>
          <th>With</th>
          <th style="width:250px;">Why</th>
          <th>Comfort</th>
          <th>Txn ID</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody id="leads-body">
        <!-- Data populated here -->
      </tbody>
    </table>
    <div id="no-data" class="no-data" style="display:none;">Waiting for first application...</div>
  </div>
</div>

<script>
  const SCRIPT_URL = '/api/leads';
  let guestData = [];

  async function fetchData() {
    const loader = document.getElementById('loader');
    const tbody = document.getElementById('leads-body');
    const noData = document.getElementById('no-data');
    
    loader.style.display = 'flex';
    tbody.innerHTML = '';
    noData.style.display = 'none';

    try {
      const response = await fetch(SCRIPT_URL);
      const data = await response.json();
      
      if (!Array.isArray(data)) throw new Error('Invalid data format');
      
      guestData = data.sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp));
      renderTable(guestData);
      
    } catch (error) {
      console.error('Fetch Error:', error);
      tbody.innerHTML = `<tr><td colspan="14" style="text-align:center; color:#b43c3c; padding:40px;">Failed to load data. Ensure REDIS_URL is connected and you have Redeployed.</td></tr>`;
    } finally {
      loader.style.display = 'none';
      if (guestData.length === 0) noData.style.display = 'block';
    }
  }

  function renderTable(data) {
    const tbody = document.getElementById('leads-body');
    tbody.innerHTML = data.map(item => {
      const txn = item.transaction || item.transaction_id || '';
      const isPaid = txn && txn.trim() !== '';
      const date = item.timestamp ? new Date(item.timestamp).toLocaleString([], {month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'}) : '—';
      
      return `
        <tr>
          <td style="color:var(--cream-dk); font-size:0.75rem;">${date}</td>
          <td style="font-weight:600; color:var(--white);">${item.name || '—'}</td>
          <td style="font-family:monospace;">${item.phone || '—'}</td>
          <td>${item.email || '—'}</td>
          <td style="color:var(--gold-light);">${item.instagram || '—'}</td>
          <td style="color:var(--gold); font-weight:600;">${item.tier || '—'}</td>
          <td>${item.occupation || '—'}</td>
          <td>${item.age || '—'}</td>
          <td>${item.source || '—'}</td>
          <td>${item.attending || '—'}</td>
          <td class="col-why">${item.why || '—'}</td>
          <td>${item.comfort || '—'}</td>
          <td style="font-family:monospace; font-size:0.75rem; color:var(--gold-dk);">${txn || '—'}</td>
          <td>
            <span class="status ${isPaid ? 'status-paid' : 'status-pending'}">
              ${isPaid ? 'Paid' : 'Applied'}
            </span>
          </td>
        </tr>
      `;
    }).join('');
  }

  function filterData() {
    const term = document.getElementById('search').value.toLowerCase();
    const filtered = guestData.filter(i => 
      Object.values(i).some(val => String(val).toLowerCase().includes(term))
    );
    renderTable(filtered);
  }

  fetchData();
</script>

</body>
</html>
